<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Central - Registro de Médico</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
     <div class="container">
        <div class="card">
            <h2><i class="fas fa-user-md"></i> Registrar Nuevo Médico</h2>
            
            <div class="alert alert-info">
                <i class="fas fa-info-circle"></i>
                <span>Sistema de Registro de Profesionales Médicos - Hospital Central</span>
            </div>

            <!-- SECCIÓN: DATOS PERSONALES -->
            <fieldset style="border: 1px solid #e2e8f0; padding: 20px; margin-bottom: 20px; border-radius: 8px;">
                <legend style="padding: 0 10px; color: #667eea; font-weight: 600;">
                    <i class="fas fa-user"></i> DATOS PERSONALES
                </legend>

                <div class="grid grid-3">
                    <div class="form-group">
                        <label for="nombre"><i class="fas fa-edit"></i> Nombre</label>
                        <input type="text" id="nombre" placeholder="Nombre completo" required>
                    </div>

                    <div class="form-group">
                        <label for="apellido"><i class="fas fa-edit"></i> Apellido</label>
                        <input type="text" id="apellido" placeholder="Apellido" required>
                    </div>

                    <div class="form-group">
                        <label for="genero"><i class="fas fa-venus-mars"></i> Género</label>
                        <select id="genero" required>
                            <option value="">-- Selecciona --</option>
                            <option value="masculino">Masculino</option>
                            <option value="femenino">Femenino</option>
                            <option value="otro">Otro</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-3">
                    <div class="form-group">
                        <label for="dni"><i class="fas fa-id-card"></i> DNI/Cédula</label>
                        <input type="text" id="dni" placeholder="XX.XXX.XXX" required>
                    </div>

                    <div class="form-group">
                        <label for="fecha_nac"><i class="fas fa-birthday-cake"></i> Fecha de Nacimiento</label>
                        <input type="date" id="fecha_nac" required>
                    </div>

                    <div class="form-group">
                        <label for="nacionalidad"><i class="fas fa-globe"></i> Nacionalidad</label>
                        <input type="text" id="nacionalidad" placeholder="Argentina" required>
                    </div>
                </div>
            </fieldset>

            <!-- SECCIÓN: INFORMACIÓN PROFESIONAL -->
            <fieldset style="border: 1px solid #e2e8f0; padding: 20px; margin-bottom: 20px; border-radius: 8px;">
                <legend style="padding: 0 10px; color: #667eea; font-weight: 600;">
                    <i class="fas fa-stethoscope"></i> INFORMACIÓN PROFESIONAL
                </legend>

                <div class="grid grid-3">
                    <div class="form-group">
                        <label for="especialidad"><i class="fas fa-stethoscope"></i> Especialidad Médica</label>
                        <select id="especialidad" required>
                            <option value="">-- Selecciona especialidad --</option>
                            <option value="cardiologia">Cardiología</option>
                            <option value="pediatria">Pediatría</option>
                            <option value="dermatologia">Dermatología</option>
                            <option value="traumatologia">Traumatología</option>
                            <option value="oftalmologia">Oftalmología</option>
                            <option value="neurologia">Neurología</option>
                            <option value="psicologia">Psicología</option>
                            <option value="general">Medicina General</option>
                            <option value="cirugia">Cirugía General</option>
                            <option value="anestesiologia">Anestesiología</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="matricula"><i class="fas fa-certificate"></i> Número de Matrícula</label>
                        <input type="text" id="matricula" placeholder="MP-XXXX" required>
                    </div>

                    <div class="form-group">
                        <label for="colegio"><i class="fas fa-building"></i> Colegio Profesional</label>
                        <select id="colegio" required>
                            <option value="">-- Selecciona --</option>
                            <option value="cmba">Colegio Médico de Buenos Aires</option>
                            <option value="colegiopa">Colegio Médico de la Provincia de Buenos Aires</option>
                            <option value="asiba">Asociación de Médicos Privados de Buenos Aires</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-2">
                    <div class="form-group">
                        <label for="experiencia"><i class="fas fa-briefcase"></i> Años de Experiencia</label>
                        <input type="number" id="experiencia" placeholder="Ej: 10" min="0" max="60" required>
                    </div>

                    <div class="form-group">
                        <label for="institucion"><i class="fas fa-university"></i> Institución de Formación</label>
                        <input type="text" id="institucion" placeholder="Universidad/Instituto" required>
                    </div>
                </div>

                <div class="grid grid-2">
                    <div class="form-group">
                        <label for="horario_inicio"><i class="fas fa-clock"></i> Horario de Inicio</label>
                        <input type="time" id="horario_inicio" required>
                    </div>

                    <div class="form-group">
                        <label for="horario_fin"><i class="fas fa-clock"></i> Horario de Fin</label>
                        <input type="time" id="horario_fin" required>
                    </div>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-calendar-days"></i> Días de Atención</label>
                    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin-top: 10px;">
                        <label style="display: flex; align-items: center; gap: 8px;">
                            <input type="checkbox" value="lunes"> Lunes
                        </label>
                        <label style="display: flex; align-items: center; gap: 8px;">
                            <input type="checkbox" value="martes"> Martes
                        </label>
                        <label style="display: flex; align-items: center; gap: 8px;">
                            <input type="checkbox" value="miercoles"> Miércoles
                        </label>
                        <label style="display: flex; align-items: center; gap: 8px;">
                            <input type="checkbox" value="jueves"> Jueves
                        </label>
                        <label style="display: flex; align-items: center; gap: 8px;">
                            <input type="checkbox" value="viernes"> Viernes
                        </label>
                        <label style="display: flex; align-items: center; gap: 8px;">
                            <input type="checkbox" value="sabado"> Sábado
                        </label>
                    </div>
                </div>
            </fieldset>

            <!-- SECCIÓN: INFORMACIÓN DE CONTACTO -->
            <fieldset style="border: 1px solid #e2e8f0; padding: 20px; margin-bottom: 20px; border-radius: 8px;">
                <legend style="padding: 0 10px; color: #667eea; font-weight: 600;">
                    <i class="fas fa-envelope"></i> INFORMACIÓN DE CONTACTO
                </legend>

                <div class="grid grid-2">
                    <div class="form-group">
                        <label for="email"><i class="fas fa-envelope"></i> Correo Electrónico</label>
                        <input type="email" id="email" placeholder="medico@hospitalcentral.com" required>
                    </div>

                    <div class="form-group">
                        <label for="telefono"><i class="fas fa-phone"></i> Teléfono</label>
                        <input type="tel" id="telefono" placeholder="+54 11 XXXX-XXXX" required>
                    </div>
                </div>

                <div class="grid grid-2">
                    <div class="form-group">
                        <label for="direccion"><i class="fas fa-map-marker-alt"></i> Domicilio</label>
                        <input type="text" id="direccion" placeholder="Calle, número" required>
                    </div>

                    <div class="form-group">
                        <label for="ciudad"><i class="fas fa-city"></i> Ciudad</label>
                        <input type="text" id="ciudad" placeholder="Buenos Aires" required>
                    </div>
                </div>
            </fieldset>

            <!-- SECCIÓN: CREDENCIALES DEL SISTEMA -->
            <fieldset style="border: 1px solid #e2e8f0; padding: 20px; margin-bottom: 20px; border-radius: 8px;">
                <legend style="padding: 0 10px; color: #667eea; font-weight: 600;">
                    <i class="fas fa-lock"></i> CREDENCIALES DEL SISTEMA
                </legend>

                <div class="grid grid-2">
                    <div class="form-group">
                        <label for="usuario"><i class="fas fa-user"></i> Nombre de Usuario</label>
                        <input type="text" id="usuario" placeholder="usuario.medico" required>
                    </div>

                    <div class="form-group">
                        <label for="numero_empleado"><i class="fas fa-id-badge"></i> Número de Empleado</label>
                        <input type="text" id="numero_empleado" placeholder="EMP-XXXX" required>
                    </div>
                </div>

                <div class="grid grid-2">
                    <div class="form-group">
                        <label for="contraseña"><i class="fas fa-lock"></i> Contraseña</label>
                        <input type="password" id="contraseña" placeholder="Mínimo 8 caracteres" required>
                    </div>

                    <div class="form-group">
                        <label for="confirmar"><i class="fas fa-lock"></i> Confirmar Contraseña</label>
                        <input type="password" id="confirmar" placeholder="Confirma tu contraseña" required>
                    </div>
                </div>

                <div class="alert alert-warning" style="margin-top: 15px;">
                    <i class="fas fa-shield-alt"></i>
                    <span>La contraseña debe contener mayúsculas, minúsculas y números</span>
                </div>
            </fieldset>

            <!-- SECCIÓN: TÉRMINOS -->
            <div style="background: #f7fafc; padding: 15px; border-radius: 8px; margin-bottom: 20px;">
                <label style="display: flex; align-items: flex-start; gap: 10px; cursor: pointer;">
                    <input type="checkbox" style="margin-top: 3px;" required>
                    <span>He leído y acepto los <strong>Términos y Condiciones</strong> y la <strong>Política de Privacidad</strong> del Hospital Central</span>
                </label>
                <label style="display: flex; align-items: flex-start; gap: 10px; cursor: pointer; margin-top: 10px;">
                    <input type="checkbox" style="margin-top: 3px;" required>
                    <span>Confirmo que la información proporcionada es veraz y completa</span>
                </label>
            </div>

            <!-- BOTONES -->
            <div class="button-group" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <button type="submit" class="btn-primary" style="width: 100%;">
                    <i class="fas fa-user-plus"></i> Registrar Médico
                </button>
                <a href="inicio.html" class="btn-secondary" style="text-align: center; width: 100%;">
                    <i class="fas fa-times"></i> Cancelar
                </a>
            </div>

            <div style="margin-top: 20px; text-align: center; color: #718096; border-top: 2px solid #e2e8f0; padding-top: 20px;">
                <p>¿Ya tienes cuenta? <a href="inicio.html" target="principal" style="color: #667eea; font-weight: 600;">Inicia sesión aquí</a></p>
            </div>
        </div>
    </div>

    <script src="registro.js"></script>
</body>
</html>
