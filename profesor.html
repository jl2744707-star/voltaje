<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Médico - Hospital Central</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        .layout {
            display: grid;
            grid-template-columns: 250px 1fr;
            min-height: 100vh;
            gap: 0;
        }

        .main-content {
            padding: 0;
            overflow-y: auto;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        @media (max-width: 768px) {
            .layout {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body style="margin: 0; padding: 0;">
    <div style="position: sticky; top: 0; z-index: 200;">
        <iframe src="banner.html" style="height: 80px; width: 100%; border: none;"></iframe>
    </div>
    
    <div class="layout">
        <div style="padding: 0;">
            <iframe src="indiceprof.html" style="height: calc(100vh - 80px); width: 100%;"></iframe>
        </div>
        <div class="main-content">
            <iframe name="principal2" src="mi-cuenta-medico.html" style="height: calc(100vh - 80px);"></iframe>
        </div>
    </div>
</body>
</html>
