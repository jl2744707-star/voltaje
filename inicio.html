<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Turnos - Hospital Central</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container full-height">
        <div class="card login-card">
            <div class="text-center mb-20">
                <h1><i class="fas fa-hospital"></i> Hospital Central</h1>
                <p>Sistema de Gestión de Turnos</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="usuario"><i class="fas fa-user"></i> Usuario</label>
                    <input type="text" id="usuario" placeholder="Ingresa tu usuario" required>
                </div>

                <div class="form-group">
                    <label for="contraseña"><i class="fas fa-lock"></i> Contraseña</label>
                    <input type="password" id="contraseña" placeholder="Ingresa tu contraseña" required>
                </div>

                <div class="form-group">
                    <label><input type="checkbox"> Recuérdame</label>
                </div>

                <button type="button" onclick="ingresar()" class="btn-primary" style="width: 100%;">
                    <i class="fas fa-sign-in-alt"></i> Iniciar Sesión
                </button>
            </form>

            <div class="text-center mt-20" style="border-top: 2px solid #e2e8f0; padding-top: 20px;">
                <p>¿No tienes cuenta?</p>
                <a href="registro.html" class="btn btn-secondary" style="width: 100%; margin-top: 10px;">
                    <i class="fas fa-user-plus"></i> Crear Nueva Cuenta
                </a>
            </div>

            <div class="text-center mt-20" style="font-size: 0.95em; color: var(--text-secondary);">
                <a href="#">¿Olvidaste tu contraseña?</a>
            </div>
        </div>
    </div>

    <script src="eje1.js"></script>
</body>
</html>
