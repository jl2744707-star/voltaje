<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Central</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        .banner-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .banner-title {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .banner-title h1 {
            margin: 0;
            font-size: 1.8em;
        }

        .banner-title p {
            margin: 0;
            opacity: 0.9;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(255, 255, 255, 0.2);
            padding: 10px 15px;
            border-radius: 8px;
        }

        .user-info a {
            color: white;
            text-decoration: none;
            padding: 8px 15px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 5px;
            transition: all 0.3s ease;
        }

        .user-info a:hover {
            background: rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body>
    <div class="banner-header">
        <div class="banner-title">
            <i class="fas fa-hospital" style="font-size: 1.8em;"></i>
            <div>
                <h1>Hospital Central</h1>
                <p>Sistema de Gestión de Turnos Médicos</p>
            </div>
        </div>
        <div class="user-info">
            <i class="fas fa-user-circle" style="font-size: 1.5em;"></i>
            <span id="nombreUsuario">Bienvenido</span>
            <a href="inicio.html" target="_top" title="Cerrar sesión">
                <i class="fas fa-sign-out-alt"></i>
            </a>
        </div>
    </div>
</body>
</html>
